version: "3.9"

services:

  ai_service:
    build: ./ai_service
    ports:
      - "5001:5001"
    env_file:
      - ./ai_service/.env

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - ai_service

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend